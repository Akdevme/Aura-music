<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#12071f" />
    <title>AURA TUNE - Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        color: #f8fafc;
        background:
          radial-gradient(circle at top left, rgba(236, 72, 153, 0.24), transparent 32rem),
          radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.22), transparent 30rem),
          #12071f;
      }

      main {
        width: min(30rem, calc(100% - 2rem));
        padding: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 1.5rem;
        background: rgba(15, 23, 42, 0.72);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(20px);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 3.5rem);
        line-height: 1;
      }

      p {
        margin: 1rem 0 0;
        color: #cbd5e1;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        margin-top: 1.5rem;
        padding: 0.8rem 1rem;
        border-radius: 999px;
        color: white;
        text-decoration: none;
        font-weight: 700;
        background: linear-gradient(135deg, #a855f7, #ec4899);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AURA TUNE</h1>
      <p>You are offline. Your installed app shell is ready, but search and streaming need a connection.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
